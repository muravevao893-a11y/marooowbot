<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#07080d" />
  <title>&marooow Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app/static/styles.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
  <div class="noise" aria-hidden="true"></div>

  <div class="splash" id="splash">
    <div class="splash-hero">
      <div class="halo"></div>
      <div class="mascot" aria-hidden="true">
        <div class="mascot-face">&</div>
        <div class="mascot-star">★</div>
      </div>
      <div class="splash-title">marooow</div>
      <div class="splash-subtitle">cases · games · drops</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
      <div class="splash-status" id="splashStatus">Загрузка Mini App…</div>
      <div class="progress"><em id="splashProgress"></em></div>
    </div>
  </div>

  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">&</div>
        <div>
          <b>&marooow</b>
          <span>подарки · кейсы · активность</span>
        </div>
      </div>
      <div class="top-actions">
        <button class="pill ref" id="btnRef" type="button" aria-label="Реферальная ссылка"><span data-icon="link"></span><b>Реф.</b></button>
        <button class="pill balance" id="btnTopup" type="button" aria-label="Баланс"><span class="coin-star">★</span><b id="balanceText">0</b><i>+</i></button>
      </div>
    </header>

    <main class="viewport" id="viewport">
      <div class="skeleton-page">
        <div class="sk sk-hero"></div>
        <div class="sk-row"><div class="sk"></div><div class="sk"></div></div>
      </div>
    </main>

    <nav class="bottom-nav" id="bottomNav" aria-label="Навигация">
      <button class="active" data-tab="free" type="button"><span data-icon="gift"></span><small>Бонусы</small></button>
      <button data-tab="pass" type="button"><span data-icon="sword"></span><small>Пропуск</small></button>
      <button data-tab="games" type="button"><span data-icon="target"></span><small>Игры</small></button>
      <button data-tab="cases" type="button"><span data-icon="diamond"></span><small>Кейсы</small></button>
      <button data-tab="profile" type="button"><span data-icon="user"></span><small>Профиль</small></button>
    </nav>
  </div>

  <section class="sheet" id="topupSheet" aria-hidden="true">
    <div class="sheet-bg" data-close-sheet></div>
    <div class="sheet-panel">
      <div class="dragline"></div>
      <div class="sheet-title">
        <div>
          <h2>Пополнение баланса</h2>
          <p>Выбери способ и сумму</p>
        </div>
        <button class="round-close" data-close-sheet type="button">×</button>
      </div>
      <div class="pay-switch" id="paySwitch">
        <button class="active" data-pay="stars" type="button"><span>★</span>Stars</button>
        <button data-pay="ton" type="button"><span>💎</span>TON</button>
        <button data-pay="send" type="button"><span>◆</span>Send</button>
        <button data-pay="gifts" type="button"><span>🎁</span>Gifts</button>
      </div>
      <div id="ton-connect" class="ton-connect"></div>
      <div id="topupContent" class="topup-content"></div>
    </div>
  </section>

  <section class="modal" id="statusModal" aria-hidden="true">
    <div class="modal-bg" data-close-modal></div>
    <div class="modal-card">
      <div class="status-ring" id="statusRing"><span id="statusIcon">✓</span></div>
      <h2 id="statusTitle">Готово</h2>
      <p id="statusText">Операция выполнена.</p>
      <button class="primary full" data-close-modal type="button">Понятно</button>
    </div>
  </section>

  <div class="toast" id="toast"></div>
  <script src="/app/static/app.js"></script>
</body>
</html>
