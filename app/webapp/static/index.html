<style>
:root{

}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;overflow-x:hidden}
button,input{font:inherit;color:inherit}button{border:0;background:none;cursor:pointer}a{color:inherit;text-decoration:none}

.glow{position:absolute;border-radius:999px;filter:blur(48px);opacity:.34;pointer-events:none;animation:float 7s ease-in-out infinite}.g1{width:210px;height:210px;background:#ffb232;right:-80px;top:64px}.g2{width:170px;height:170px;background:#7e57ff;left:-70px;top:280px;animation-delay:-2s}.g3{width:180px;height:180px;background:#00b8ff;right:-80px;bottom:110px;animation-delay:-4s}@keyframes float{50%{transform:translate3d(0,18px,0) scale(1.05)}}

.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.brand-mark{width:40px;height:40px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#ffd978,#8b5b14);box-shadow:0 12px 30px rgba(255,179,47,.24)}.brand-text b{display:block;font-size:24px;letter-spacing:-.8px;line-height:1}.brand-text span{display:block;color:var(--muted);font-weight:700;font-size:12px;margin-top:3px}.pills{display:flex;align-items:center;gap:8px}.pill{height:38px;border-radius:999px;padding:0 12px;display:flex;align-items:center;gap:8px;background:#10131d;border:1px solid var(--line);font-weight:900;font-size:13px;white-space:nowrap;box-shadow:inset 0 1px rgba(255,255,255,.04)}.pill.gold{border-color:var(--line2);color:#ffe6ad;background:linear-gradient(180deg,#1a1720,#0d1018)}.icon{width:20px;height:20px;display:inline-block;vertical-align:middle}.icon svg{display:block;width:100%;height:100%}.i-gold{color:var(--gold)}.i-muted{color:#aeb5c9}.btn{height:48px;border-radius:18px;padding:0 18px;font-weight:1000;background:linear-gradient(180deg,#ffe08a,#ffb333);color:#17110a;box-shadow:0 12px 28px rgba(255,179,47,.22),inset 0 1px rgba(255,255,255,.45);transition:.18s transform,.18s filter}.btn:active{transform:scale(.97)}.btn.dark{background:#11141f;color:var(--text);border:1px solid var(--line);box-shadow:none}.btn.ghost{background:transparent;color:#ffd98b;border:1px solid var(--line2);box-shadow:none}.btn:disabled{opacity:.42;filter:grayscale(1);box-shadow:none;cursor:not-allowed}
.hero{position:relative;overflow:hidden;border-radius:32px;padding:26px 22px;min-height:232px;background:linear-gradient(135deg,#141927 0%,#10131c 45%,#30220e 100%);border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow);isolation:isolate}.hero:before{content:"";position:absolute;inset:-60px -70px auto auto;width:260px;height:260px;border-radius:999px;background:radial-gradient(circle,#ffbd42,transparent 62%);opacity:.48}.hero:after{content:"";position:absolute;right:-70px;bottom:-84px;width:240px;height:240px;border-radius:42px;background:linear-gradient(135deg,rgba(255,217,125,.9),rgba(255,143,21,.75));filter:blur(.1px);transform:rotate(12deg);opacity:.93;z-index:-1}.hero h1{font-size:33px;line-height:.98;margin:0 0 10px;letter-spacing:-1.2px}.hero p{margin:0;color:#dfe3f0;font-weight:700;line-height:1.45;font-size:15px;max-width:220px}.hero-actions{display:flex;gap:10px;margin-top:20px;align-items:center}.case-3d{position:absolute;right:22px;bottom:24px;width:130px;height:112px;filter:drop-shadow(0 26px 34px rgba(0,0,0,.4));animation:caseFloat 3.8s ease-in-out infinite}.case-3d svg{width:100%;height:100%}@keyframes caseFloat{50%{transform:translateY(-8px)}}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.stat{border-radius:24px;padding:16px;background:linear-gradient(180deg,#11141f,#090b11);border:1px solid var(--line);min-height:112px;position:relative;overflow:hidden}.stat:before{content:"";position:absolute;inset:auto -40px -50px auto;width:120px;height:120px;border-radius:999px;background:rgba(255,190,74,.14);filter:blur(18px)}.stat .big{font-size:27px;font-weight:1000;letter-spacing:-.8px;margin-top:12px}.stat .label{color:var(--muted);font-weight:800;font-size:12px}.section{margin-top:20px}.section-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 12px}.section-head h2{margin:0;font-size:18px;letter-spacing:-.3px}.section-head span{font-size:12px;color:var(--muted);font-weight:800}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{position:relative;overflow:hidden;border-radius:26px;padding:17px;min-height:154px;background:linear-gradient(180deg,#111521,#090b11);border:1px solid var(--line);box-shadow:0 16px 40px rgba(0,0,0,.22);transition:.18s transform,.18s border-color}.card:active{transform:scale(.985)}.card.glint:before{content:"";position:absolute;inset:-40% auto auto -70%;height:230%;width:60%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:rotate(22deg);animation:shine 5s linear infinite}@keyframes shine{0%{left:-85%}45%,100%{left:130%}}.card h3{font-size:17px;margin:12px 0 5px}.card p{margin:0;color:var(--muted);font-weight:700;font-size:13px;line-height:1.35}.card .mini-icon{width:56px;height:56px;border-radius:22px;display:grid;place-items:center;background:linear-gradient(180deg,#1b2030,#11131d);border:1px solid rgba(255,255,255,.08);color:#ffd67d;box-shadow:inset 0 1px rgba(255,255,255,.05),0 12px 30px rgba(0,0,0,.25)}.wide{grid-column:1/-1;min-height:126px}.progress{height:12px;border-radius:999px;background:#11141e;overflow:hidden;border:1px solid var(--line);margin-top:12px}.progress div{height:100%;width:0;background:linear-gradient(90deg,#ffb234,#ffe18b);border-radius:999px;box-shadow:0 0 20px rgba(255,190,68,.45);transition:width .8s cubic-bezier(.2,.8,.2,1)}.list{display:grid;gap:10px}.row{display:flex;align-items:center;gap:12px;padding:13px;border-radius:20px;background:#0e111a;border:1px solid var(--line)}.row-main{min-width:0;flex:1}.row-main b{display:block;font-size:14px}.row-main span{display:block;color:var(--muted);font-size:12px;font-weight:700;margin-top:2px}.amounts{display:grid;gap:10px;margin-top:12px}.amount{display:flex;align-items:center;gap:12px;width:100%;padding:14px;border-radius:20px;background:#11141d;border:1px solid var(--line);transition:.18s}.amount.active{border-color:rgba(255,199,88,.75);box-shadow:0 0 0 3px rgba(255,193,76,.08)}.amount .radio{width:22px;height:22px;border-radius:999px;border:1px solid #545b70;margin-left:auto}.amount.active .radio{border:6px solid #ffcf6e}.profile-head{display:flex;align-items:center;gap:14px;padding:18px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#111521,#0b0d13)}.avatar{width:72px;height:72px;border-radius:26px;overflow:hidden;background:linear-gradient(135deg,#252a3e,#1b1428);display:grid;place-items:center;border:1px solid var(--line2)}.avatar img{width:100%;height:100%;object-fit:cover}.avatar svg{width:34px}.profile-name{font-size:22px;font-weight:1000;letter-spacing:-.5px}.profile-meta{color:var(--muted);font-weight:800;font-size:13px;margin-top:3px}.copybox{display:flex;gap:8px;margin-top:12px}.copybox input{min-width:0;flex:1;height:44px;border:1px solid var(--line);border-radius:16px;background:#0c0f16;color:#fff;padding:0 12px;font-weight:800}.copybox button{height:44px;border-radius:16px;padding:0 13px;background:#171b28;border:1px solid var(--line2);color:#ffd783;font-weight:900}.nav{position:absolute;z-index:10;left:0;right:0;bottom:0;height:var(--nav);display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:10px 10px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(5,6,10,.68),rgba(5,6,10,.96) 30%);backdrop-filter:blur(18px);border-top:1px solid var(--line)}@media (min-width:560px){.nav{border-radius:0 0 32px 32px}}.nav button{display:grid;place-items:center;align-content:center;gap:5px;border-radius:18px;color:#8d94aa;font-size:11px;font-weight:900}.nav button.active{color:#ffd479;background:linear-gradient(180deg,rgba(255,198,83,.12),rgba(255,198,83,.04));box-shadow:inset 0 0 0 1px rgba(255,206,94,.25)}.nav .icon{width:22px;height:22px}.sheet{position:absolute;z-index:40;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(8px);display:none;align-items:flex-end}.sheet.show{display:flex}.sheet-card{width:100%;max-height:88%;overflow:auto;background:#10131b;border-radius:30px 30px 0 0;border:1px solid rgba(255,255,255,.08);box-shadow:0 -30px 100px rgba(0,0,0,.58);padding:20px 16px 16px;animation:sheetUp .28s cubic-bezier(.2,.8,.2,1)}@media (min-width:560px){.sheet{align-items:center;justify-content:center}.sheet-card{border-radius:30px;max-width:410px;max-height:760px}}@keyframes sheetUp{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}.sheet-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.sheet-top h2{margin:0;font-size:22px}.close{width:44px;height:44px;border-radius:18px;background:#1a1e2b;border:1px solid var(--line);display:grid;place-items:center}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.tab{height:42px;border-radius:16px;border:1px solid var(--line);background:#121621;color:#c8cedc;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px}.tab.active{border-color:#fff;color:#fff;background:#181c28}.promo{width:100%;height:48px;border-radius:16px;border:1px solid var(--line);background:#0b0e15;padding:0 14px;font-weight:800;color:#fff;outline:none}.note{border-radius:18px;padding:12px;background:#1a1520;border:1px solid rgba(255,198,83,.16);color:#dccaaa;font-weight:750;font-size:13px;line-height:1.35}.status{position:absolute;z-index:80;inset:0;display:none;place-items:center;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);padding:18px}.status.show{display:grid}.status-card{width:min(340px,100%);border-radius:30px;background:#121622;border:1px solid var(--line);box-shadow:var(--shadow);text-align:center;padding:28px 22px;animation:pop .25s cubic-bezier(.2,.8,.2,1)}@keyframes pop{from{transform:scale(.92);opacity:.5}to{transform:none;opacity:1}}.status-mark{width:82px;height:82px;border-radius:28px;margin:0 auto 18px;display:grid;place-items:center}.status-mark.ok{background:linear-gradient(180deg,#47f0a5,#15b86d);box-shadow:0 18px 50px rgba(42,224,140,.25)}.status-mark.bad{background:linear-gradient(180deg,#ff7892,#ef365d);box-shadow:0 18px 50px rgba(255,72,104,.24)}.status-mark.wait{background:linear-gradient(180deg,#ffe08a,#ffae2f);box-shadow:0 18px 50px rgba(255,180,48,.24)}.status-card h2{margin:0 0 10px}.status-card p{margin:0 0 18px;color:#c5cad8;font-weight:700}.splash{position:absolute;z-index:100;inset:0;background:radial-gradient(circle at 50% 25%,rgba(255,191,69,.18),transparent 35%),#05060a;display:grid;place-items:center;transition:.45s opacity,.45s visibility}.splash.hide{opacity:0;visibility:hidden}.splash-inner{text-align:center}.loader-logo{width:116px;height:116px;border-radius:36px;margin:0 auto 18px;display:grid;place-items:center;background:linear-gradient(135deg,#ffe08e,#ffab29);box-shadow:0 28px 80px rgba(255,179,47,.28);animation:pulse 1.6s ease-in-out infinite}.loader-logo svg{width:62px;color:#090a10}.splash h1{font-size:36px;margin:0 0 6px;letter-spacing:-1px}.splash p{margin:0;color:var(--muted);font-weight:800}.dots{display:flex;justify-content:center;gap:8px;margin-top:18px}.dots i{width:8px;height:8px;border-radius:99px;background:#ffca65;animation:bounce 1s infinite}.dots i:nth-child(2){animation-delay:.12s}.dots i:nth-child(3){animation-delay:.24s}@keyframes pulse{50%{transform:translateY(-5px) scale(1.03)}}@keyframes bounce{50%{transform:translateY(-7px);opacity:.55}}.hide{display:none!important}.muted{color:var(--muted)}.version{position:absolute;right:16px;top:76px;color:#656b7c;font-size:10px;font-weight:800}.auth-warn{display:none;margin-top:12px;border-radius:18px;padding:12px;background:rgba(255,79,109,.1);border:1px solid rgba(255,79,109,.22);color:#ffd8de;font-weight:800;font-size:13px;line-height:1.35}.auth-warn.show{display:block}
</style>

<body>
<div class="app" id="app">
  <div class="noise"></div><div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div><div class="version">UI v10</div>
  <main class="screen" id="screen"></main>
  <nav class="nav" id="nav"></nav>
  <div class="sheet" id="topupSheet"></div>
  <div class="status" id="statusBox"></div>
  <div class="splash" id="splash"><div class="splash-inner"><div class="loader-logo" id="loaderLogo"></div><h1>&marooow</h1><p>загрузка mini app</p><div class="dots"><i></i><i></i><i></i></div></div></div>
</div>
<script>
const tg = window.Telegram?.WebApp;
try{tg?.ready?.();tg?.expand?.();tg?.setHeaderColor?.('#05060a');tg?.setBackgroundColor?.('#05060a')}catch(e){}
const qs = new URLSearchParams(location.search);
const DEV = qs.has('dev');
const initData = tg?.initData || '';
let state = {tab:'bonus', user:null, telegram:null, chance:null, ton:null, catalog:[], inventory:[], winners:[], leaderboard:{refs:[],activity:[]}, selectedAmount:null, topupMode:'stars', authOk:false};
const $ = (s,p=document)=>p.querySelector(s);
const screen = $('#screen'), nav = $('#nav'), sheet = $('#topupSheet'), statusBox = $('#statusBox');
const svg = {
 star:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.4l2.9 6 6.6.9-4.8 4.7 1.1 6.6L12 17.5 6.2 20.6 7.3 14 2.5 9.3l6.6-.9L12 2.4z"/></svg>',
 gift:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 10h16v10H4V10zM3 7h18v3H3V7zM12 7v13M7.5 7C5.7 7 5 5.8 5.3 4.8 5.8 3 8.6 3.5 12 7c3.4-3.5 6.2-4 6.7-2.2.3 1-.4 2.2-2.2 2.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
 link:'<svg viewBox="0 0 24 24" fill="none"><path d="M10 14a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1M14 10a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 19.1l1.1-1.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
 bolt:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4 14h7l-1 8 10-13h-7l1-7z"/></svg>',
 pass:'<svg viewBox="0 0 24 24" fill="none"><path d="M6 3h12v18l-6-3-6 3V3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 7h6M9 11h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
 game:'<svg viewBox="0 0 24 24" fill="none"><path d="M7 10h10a4 4 0 0 1 3.8 2.8l.8 2.7a3 3 0 0 1-5 3l-1.8-1.8H9.2l-1.8 1.8a3 3 0 0 1-5-3l.8-2.7A4 4 0 0 1 7 10z" stroke="currentColor" stroke-width="1.8"/><path d="M8 13v3M6.5 14.5h3M15.5 14.5h.01M18 13.5h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
 diamond:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 8l4-4h8l4 4-8 12L4 8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 4l4 16 4-16M4 8h16" stroke="currentColor" stroke-width="1.4"/></svg>',
 user:'<svg viewBox="0 0 24 24" fill="none"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 21a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
 ton:'<svg viewBox="0 0 24 24" fill="none"><path d="M4 5h16l-8 14L4 5z" fill="#35b9ff"/><path d="M7 7h10l-5 9-5-9z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>',
 send:'<svg viewBox="0 0 24 24" fill="none"><path d="M21 4L3 11l7 3 3 7 8-17z" fill="#45a9ff"/><path d="M10 14l4-4" stroke="white" stroke-width="1.7" stroke-linecap="round"/></svg>',
 close:'<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>',
 check:'<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
 cross:'<svg viewBox="0 0 24 24" fill="none"><path d="M7 7l10 10M17 7L7 17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>',
 copy:'<svg viewBox="0 0 24 24" fill="none"><path d="M8 8h12v12H8V8zM4 16V4h12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>',
 case:'<svg viewBox="0 0 220 170" fill="none"><rect x="32" y="48" width="156" height="90" rx="18" fill="#11131a" stroke="#FFD06C" stroke-width="5"/><path d="M46 48V34c0-10 8-18 18-18h92c10 0 18 8 18 18v14" stroke="#FFD06C" stroke-width="10"/><path d="M32 80h156M72 48v90M148 48v90" stroke="#7a4f13" stroke-width="5"/><path d="M110 72l13 27 30 4-22 21 5 30-26-14-26 14 5-30-22-21 30-4 13-27z" fill="#FFD06C"/><rect x="88" y="86" width="44" height="28" rx="8" fill="#FFD06C"/><circle cx="110" cy="100" r="6" fill="#11131a"/></svg>'
};
function icon(name,cls=''){return `<span class="icon ${cls}">${svg[name]||svg.star}</span>`}
function safe(v){return String(v??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
async function api(path, body=null, method='POST'){
  const opts = {method, headers:{'Content-Type':'application/json'}, cache:'no-store'};
  if(method!=='GET') opts.body = JSON.stringify({initData, ...(body||{})});
  const r = await fetch(path, opts); const data = await r.json().catch(()=>({ok:false,error:'bad_json'}));
  if(!r.ok || data.ok===false) throw data; return data;
}
function toast(type,title,msg){statusBox.innerHTML=`<div class="status-card"><div class="status-mark ${type}">${icon(type==='ok'?'check':type==='bad'?'cross':'bolt')}</div><h2>${title}</h2><p>${msg||''}</p><button class="btn" onclick="closeStatus()">Понятно</button></div>`;statusBox.classList.add('show')}
function closeStatus(){statusBox.classList.remove('show')}
function fmt(n){return Number(n||0).toLocaleString('ru-RU')}
function money(n){return Number(n||0).toLocaleString('ru-RU',{maximumFractionDigits:4})}
function userName(){return state.telegram?.username ? '@'+state.telegram.username : (state.telegram?.first_name||'marooow')}
function avatar(){const p=state.user?.photo_url||state.telegram?.photo_url;return p?`<img src="${safe(p)}" alt="avatar">`:icon('user','i-gold')}
function renderShell(){
  renderNav();
  if(state.tab==='bonus') renderBonus();
  if(state.tab==='pass') renderPass();
  if(state.tab==='games') renderGames();
  if(state.tab==='cases') renderCases();
  if(state.tab==='profile') renderProfile();
}
function top(){return `<div class="top"><div class="brand"><div class="brand-mark">${icon('star')}</div><div class="brand-text"><b>&marooow</b><span>подарки · кейсы · активность</span></div></div><div class="pills"><button class="pill gold" onclick="copyRef()">${icon('link')} Реф.</button><button class="pill" onclick="openTopup()">${icon('star','i-gold')} ${fmt(state.user?.stars||0)} +</button></div></div>${!state.authOk?`<div class="auth-warn show">Профиль открыт в preview-режиме. Для пополнения и начислений открой Mini App через свежую кнопку /miniapp в боте.</div>`:''}`}
function renderBonus(){
  screen.innerHTML = top()+`<section class="hero"><h1>Ежедневные<br>бонусы</h1><p>Забирай награды, прокачивай шанс и участвуй в дропах.</p><div class="hero-actions"><button class="btn" onclick="claimDaily()">Забрать</button><button class="btn ghost" onclick="setTab('profile')">Профиль</button></div><div class="case-3d">${svg.case}</div></section><div class="stats"><div class="stat"><span class="label">Твой шанс</span><div class="big">${state.chance?.final||3}%</div><span class="label">база ${state.chance?.base||3}% + рефы ${state.chance?.bonus||0}%</span></div><div class="stat"><span class="label">Активность 7д</span><div class="big">${fmt(state.chance?.attempts_7d||0)}</div><span class="label">комментариев засчитано</span></div></div><section class="section"><div class="section-head"><h2>Быстрые действия</h2><span>обновлено</span></div><div class="grid"><button class="card glint" onclick="claimDaily()"><div class="mini-icon">${icon('gift')}</div><h3>Daily Bonus</h3><p>получить награду</p></button><button class="card" onclick="copyRef()"><div class="mini-icon">${icon('link')}</div><h3>Referral Boost</h3><p>повышай шанс</p></button><button class="card wide" onclick="openTopup()"><div class="mini-icon">${icon('star')}</div><h3>Пополнить баланс</h3><p>Stars / TON / Send / Gifts, красиво и безопасно</p></button></div></section>`;
}
function renderPass(){
 const exp=state.user?.exp||0,next=state.user?.next_level_exp||10000,p=Math.min(100,Math.round(exp/next*100));
 screen.innerHTML=top()+`<section class="hero"><h1>Battle Pass</h1><p>Уровни, активность, задания и недельный прогресс.</p><div class="hero-actions"><button class="btn" onclick="setTab('games')">Фарм EXP</button></div><div class="case-3d">${svg.pass}</div></section><section class="section"><div class="profile-head"><div class="avatar">${avatar()}</div><div><div class="profile-name">Level ${state.user?.level||1}</div><div class="profile-meta">${fmt(exp)} / ${fmt(next)} EXP</div><div class="progress"><div style="width:${p}%"></div></div></div></div></section><section class="section"><div class="grid"><div class="card"><div class="mini-icon">${icon('bolt')}</div><h3>Активность</h3><p>${fmt(state.chance?.attempts_7d||0)} действий за неделю</p></div><div class="card"><div class="mini-icon">${icon('gift')}</div><h3>Победы</h3><p>${fmt(state.user?.wins_count||0)} подарков</p></div></div></section>`;
}
function renderGames(){screen.innerHTML=top()+`<section class="section"><div class="section-head"><h2>Игры</h2><span>fan demo</span></div><div class="grid"><button class="card glint" onclick="play('plinko')"><div class="mini-icon">${icon('game')}</div><h3>PLINKO</h3><p>мини-игра для ивентов</p></button><button class="card" onclick="play('crash')"><div class="mini-icon">${icon('bolt')}</div><h3>CRASH</h3><p>демо-режим без ставок</p></button><button class="card wide" onclick="play('case-spin')"><div class="mini-icon">${icon('case')}</div><h3>Spin Case</h3><p>анимация кейса и EXP за активность</p></button></div></section><section class="section"><div class="note">Игры фановые/ивентовые: без казино, реальных ставок и вывода денег. Баланс используется для бонусов, кейсов и промо-логики проекта.</div></section>`}
function renderCases(){screen.innerHTML=top()+`<section class="hero"><h1>Кейсы</h1><p>Витрины для ивентов, промо-дропов и будущих наград.</p><div class="hero-actions"><button class="btn" onclick="play('bear-case')">Открыть демо</button></div><div class="case-3d">${svg.case}</div></section><section class="section"><div class="grid"><button class="card glint" onclick="play('bear-case')"><div class="mini-icon">${icon('gift')}</div><h3>Bear Case</h3><p>event case</p></button><button class="card" onclick="loadGifts(true)"><div class="mini-icon">${icon('diamond')}</div><h3>NFT Gifts</h3><p>каталог подарков</p></button></div></section><section class="section" id="giftsPreview"></section>`}
function renderProfile(){screen.innerHTML=top()+`<section class="section"><div class="profile-head"><div class="avatar">${avatar()}</div><div><div class="profile-name">${safe(userName())}</div><div class="profile-meta">ID ${state.user?.telegram_id||state.telegram?.id||'—'} · ${fmt(state.user?.stars||0)} stars</div></div></div><div class="copybox"><input readonly value="${safe(state.user?.ref_link||'Открой через Telegram, чтобы получить ссылку')}"><button onclick="copyRef()">${icon('copy')}</button></div></section><section class="section"><div class="grid"><div class="card"><div class="mini-icon">${icon('link')}</div><h3>${fmt(state.chance?.active_refs||0)}</h3><p>активных рефералов</p></div><div class="card"><div class="mini-icon">${icon('star')}</div><h3>+${state.chance?.bonus||0}%</h3><p>реф-бонус</p></div></div></section><section class="section"><div class="section-head"><h2>Инвентарь</h2><span>мои призы</span></div><div id="inventory" class="list"><div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>Загрузка</b><span>проверяем подарки</span></div></div></div></section>`;loadInventory()}
function renderNav(){const items=[['bonus','gift','Бонусы'],['pass','pass','Пропуск'],['games','game','Игры'],['cases','diamond','Кейсы'],['profile','user','Профиль']];nav.innerHTML=items.map(([id,ic,t])=>`<button class="${state.tab===id?'active':''}" onclick="setTab('${id}')">${icon(ic)}<span>${t}</span></button>`).join('')}
function setTab(t){state.tab=t;renderShell();try{tg?.HapticFeedback?.selectionChanged?.()}catch(e){}}
async function bootstrap(){
 $('#loaderLogo').innerHTML=icon('star');
 try{const me=await api('/api/me');state={...state,...me,authOk:true};}
 catch(e){const u=tg?.initDataUnsafe?.user||{};state.telegram={id:u.id||0,username:u.username||'',first_name:u.first_name||'Guest',photo_url:u.photo_url};state.user={telegram_id:u.id||0,first_name:u.first_name||'Guest',username:u.username||'',photo_url:u.photo_url,stars:0,exp:0,level:1,next_level_exp:10000,wins_count:0,ref_link:''};state.chance={base:3,bonus:0,final:3,active_refs:0,pending_refs:0,attempts_7d:0,cap:3};state.ton={enabled:false,receiver:'',stars_per_ton:170,verified_mode:false};state.authOk:false;}
 renderShell(); setTimeout(()=>$('#splash').classList.add('hide'),600); loadSideData();
}
async function loadSideData(){try{state.winners=(await fetch('/api/winners',{cache:'no-store'}).then(r=>r.json())).items||[]}catch(e){}try{state.leaderboard=await fetch('/api/leaderboard',{cache:'no-store'}).then(r=>r.json())}catch(e){}}
async function claimDaily(){if(!state.authOk)return toast('bad','Нет авторизации','Открой Mini App через новую кнопку /miniapp в боте.');try{toast('wait','Проверяем','Начисляем ежедневный бонус...');const r=await api('/api/daily');closeStatus();toast('ok','Бонус получен',`+${r.stars_added} stars и +${r.exp_added} EXP`);await bootstrap()}catch(e){toast('bad','Не получилось',e.message||'Бонус пока недоступен')}}
async function play(game){if(!state.authOk)return toast('bad','Нет авторизации','Открой Mini App через кнопку в боте.');try{toast('wait','Запуск','Крутим анимацию...');const r=await api('/api/play/demo',{game});closeStatus();toast('ok','Готово',`+${r.exp_added} EXP · очки ${r.demo_points}`);await bootstrap()}catch(e){toast('bad','Ошибка',e.message||'Попробуй позже')}}
function openTopup(){state.selectedAmount=null;state.topupMode='stars';renderTopup();sheet.classList.add('show')}
function closeSheet(){sheet.classList.remove('show')}
function renderTopup(){const amounts=[30,100,200,500,1000,2500,5000];sheet.innerHTML=`<div class="sheet-card"><div class="sheet-top"><h2>Пополнение баланса</h2><button class="close" onclick="closeSheet()">${icon('close')}</button></div><div class="tabs">${['stars','ton','send','gifts'].map(m=>`<button class="tab ${state.topupMode===m?'active':''}" onclick="setTopupMode('${m}')">${icon(m==='stars'?'star':m==='ton'?'ton':m==='send'?'send':'gift')} ${m==='stars'?'Stars':m==='ton'?'TON':m==='send'?'Send':'Gifts'}</button>`).join('')}</div><input class="promo" placeholder="Промокод"><div id="topupBody"></div><button class="btn" style="width:100%;margin-top:12px" onclick="confirmTopup()" ${!state.selectedAmount?'disabled':''}>Подтвердить</button></div>`;renderTopupBody()}
function setTopupMode(m){state.topupMode=m;state.selectedAmount=null;renderTopup()}
function renderTopupBody(){const b=$('#topupBody'); if(state.topupMode==='gifts'){b.innerHTML='<div class="note">Отправь свой Telegram Gift проекту — после проверки админ начислит баланс вручную. Автоматический импорт личного инвентаря Telegram недоступен обычным ботам.</div>';return} if(state.topupMode==='send'){b.innerHTML='<div class="note">Send-оплата подготовлена визуально. Пока используй Stars или TON.</div>'+amountList([30,100,200,500,1000,2500]);return} if(state.topupMode==='ton'){b.innerHTML=`<div class="note">TON поступает на кошелёк проекта. После оплаты нажми проверку — если TonAPI подтвердит транзакцию, баланс начислится автоматически.</div>`+amountList([30,100,200,500,1000,2500,5000],true);return} b.innerHTML=amountList([30,100,200,500,1000,2500,5000])}
function amountList(arr,ton=false){return `<div class="amounts">${arr.map(a=>`<button class="amount ${state.selectedAmount===a?'active':''}" onclick="selectAmount(${a})"><span class="mini-icon" style="width:44px;height:44px;border-radius:16px">${icon('star')}</span><span class="row-main"><b>${fmt(a)} звёзд</b><span>${ton?'≈ '+money(a/(state.ton?.stars_per_ton||170))+' TON':'Telegram Stars'}</span></span><span class="radio"></span></button>`).join('')}</div>`}
function selectAmount(a){state.selectedAmount=a;renderTopup()}
async function confirmTopup(){if(!state.authOk)return toast('bad','Нет авторизации','Открой через кнопку бота.'); if(!state.selectedAmount)return; if(state.topupMode==='stars')return payStars(); if(state.topupMode==='ton')return payTon(); toast('bad','Скоро','Этот способ сейчас в разработке')}
async function payStars(){try{toast('wait','Создаём счёт','Сейчас откроется Telegram invoice.');const r=await api('/api/topup',{amount:state.selectedAmount});closeStatus(); if(tg?.openInvoice){tg.openInvoice(r.invoice_url, st=>{if(st==='paid')toast('ok','Оплата прошла','Баланс скоро обновится.');else toast('bad','Оплата не прошла','Счёт закрыт или отменён.')})}else location.href=r.invoice_url}catch(e){toast('bad','Ошибка оплаты',e.message||'Не удалось создать счёт')}}
async function payTon(){try{toast('wait','Готовим TON оплату','Создаём уникальный платеж.');const r=await api('/api/ton/create',{stars_amount:state.selectedAmount});closeStatus();const link=`ton://transfer/${encodeURIComponent(r.address)}?amount=${encodeURIComponent(r.amount_nano)}&text=${encodeURIComponent(r.comment)}`;sheet.innerHTML=`<div class="sheet-card"><div class="sheet-top"><h2>TON оплата</h2><button class="close" onclick="closeSheet()">${icon('close')}</button></div><div class="note"><b>Сумма:</b> ${r.amount_ton} TON<br><b>Баланс:</b> ${fmt(r.stars_amount)} stars<br><b>Комментарий:</b> ${safe(r.comment)}</div><div class="copybox"><input readonly value="${safe(r.address)}"><button onclick="copyText('${safe(r.address)}')">${icon('copy')}</button></div><a class="btn" style="display:flex;align-items:center;justify-content:center;margin-top:12px" href="${link}">Открыть кошелёк</a><button class="btn dark" style="width:100%;margin-top:10px" onclick="checkTon(${r.deposit_id})">Проверить оплату</button></div>`}catch(e){toast('bad','TON ошибка',e.message||'Не удалось создать платёж')}}
async function checkTon(id){try{toast('wait','Проверяем','Ищем транзакцию в сети TON.');const r=await api('/api/ton/confirm',{deposit_id:id});closeStatus(); if(r.status==='paid')toast('ok','Оплата прошла',`Начислено ${fmt(r.stars_added)} stars.`); else toast('wait','Ожидаем подтверждения',r.message||'Транзакция ещё индексируется.')}catch(e){toast('bad','Не найдено',e.message||'Платёж пока не подтверждён')}}
function copyText(t){navigator.clipboard?.writeText(t);try{tg?.HapticFeedback?.notificationOccurred?.('success')}catch(e){}toast('ok','Скопировано','Данные сохранены в буфер обмена')}
function copyRef(){const l=state.user?.ref_link;if(!l)return toast('bad','Нет ссылки','Открой Mini App через Telegram.');copyText(l)}
async function loadInventory(){if(!state.authOk){$('#inventory').innerHTML='<div class="row"><div class="mini-icon">'+icon('gift')+'</div><div class="row-main"><b>Нет авторизации</b><span>открой через кнопку бота</span></div></div>';return}try{const r=await api('/api/inventory');const items=r.items||[];$('#inventory').innerHTML=items.length?items.map(x=>`<div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>${safe(x.prize_name)}</b><span>${safe(x.status)} · ${safe(String(x.created_at).slice(0,10))}</span></div></div>`).join(''):'<div class="row"><div class="mini-icon">'+icon('gift')+'</div><div class="row-main"><b>Пусто</b><span>выигранные подарки появятся здесь</span></div></div>'}catch(e){}}
async function loadGifts(scroll=false){try{const r=await fetch('/api/gift-catalog',{cache:'no-store'}).then(r=>r.json());const items=(r.items||[]).slice(0,8);const el=$('#giftsPreview');if(el)el.innerHTML=`<div class="section-head"><h2>Telegram Gifts</h2><span>каталог</span></div><div class="list">${items.map(g=>`<div class="row"><div class="mini-icon">${g.media_url?`<img src="${g.media_url}" style="width:38px;height:38px;object-fit:contain">`:icon('gift')}</div><div class="row-main"><b>${safe(g.id).slice(0,18)}...</b><span>${fmt(g.star_count)} stars · ${g.remaining_count??'∞'} осталось</span></div></div>`).join('')}</div>`; if(scroll)el?.scrollIntoView({behavior:'smooth'})}catch(e){toast('bad','Каталог недоступен','Telegram Gifts не загрузились')}}
window.setTab=setTab;window.openTopup=openTopup;window.closeSheet=closeSheet;window.setTopupMode=setTopupMode;window.selectAmount=selectAmount;window.confirmTopup=confirmTopup;window.closeStatus=closeStatus;window.copyRef=copyRef;window.claimDaily=claimDaily;window.play=play;window.loadGifts=loadGifts;window.copyText=copyText;window.checkTon=checkTon;
bootstrap();
</script>
</body>
</html>
