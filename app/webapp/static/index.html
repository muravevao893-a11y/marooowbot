<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>&marooow Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/app/static/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="title">&marooow</div>
        <div class="subtitle">подарки за активность</div>
      </div>
      <button class="pill ref" id="copyRef">🔗 Реф. ссылка</button>
      <button class="balance"><span>⭐</span><b id="stars">0</b></button>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabs">
      <button data-tab="free" class="active"><span>🎁</span><small>Бесплатно</small></button>
      <button data-tab="pass"><span>🪄</span><small>Пропуск</small></button>
      <button data-tab="games"><span>🎯</span><small>Игры</small></button>
      <button data-tab="cases"><span>💎</span><small>Кейсы</small></button>
      <button data-tab="profile"><span>👤</span><small>Профиль</small></button>
    </nav>
  </div>
  <div class="toast" id="toast"></div>
  <script src="/app/static/app.js"></script>
</body>
</html>
