<script>
const tg = window.Telegram?.WebApp || null;
try{tg?.ready?.();tg?.expand?.();tg?.setHeaderColor?.('#05060a');tg?.setBackgroundColor?.('#05060a');tg?.setBottomBarColor?.('#05060a');tg?.disableVerticalSwipes?.();}catch(e){}
const initData = tg?.initData || '';
const initUnsafe = tg?.initDataUnsafe || {};
const qs = new URLSearchParams(location.search);

const svg={

function icon(name,cls=''){return `<span class="ico ${cls}">${svg[name]||svg.star}</span>`}
function safe(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function fmt(n){return Number(n||0).toLocaleString('ru-RU')} function money(n){return Number(n||0).toLocaleString('ru-RU',{maximumFractionDigits:4})}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
async function api(path,body={},method='POST',timeout=4200){const ac=new AbortController();const t=setTimeout(()=>ac.abort(),timeout);try{const opts={method,headers:{'Content-Type':'application/json'},cache:'no-store',signal:ac.signal};if(method!=='GET')opts.body=JSON.stringify({initData,...body});const r=await fetch(path,opts);const data=await r.json().catch(()=>({ok:false,error:'bad_json'}));if(!r.ok||data.ok===false)throw data;return data}finally{clearTimeout(t)}}
function fallbackState(){const u=initUnsafe?.user||{};return {ok:true,authOk:false,telegram:{id:u.id||0,username:u.username||'',first_name:u.first_name||'Guest',photo_url:u.photo_url},user:{telegram_id:u.id||0,username:u.username||'',first_name:u.first_name||'Guest',photo_url:u.photo_url,stars:0,exp:0,level:1,next_level_exp:10000,wins_count:0,ref_link:''},chance:{base:3,bonus:0,final:3,active_refs:0,pending_refs:0,attempts_7d:0,cap:3},ton:{enabled:false,receiver:'',stars_per_ton:170,verified_mode:false}}}
function toast(type,title,msg){statusBox.innerHTML=`<div class="status-card"><div class="status-mark ${type}">${icon(type==='ok'?'check':type==='bad'?'cross':'bolt')}</div><h2>${safe(title)}</h2><p>${safe(msg||'')}</p><button class="btn" onclick="closeStatus()">Понятно</button></div>`;statusBox.classList.add('show')}
function closeStatus(){statusBox.classList.remove('show')}
function avatar(){const p=state.user?.photo_url||state.telegram?.photo_url;return p?`<img src="${safe(p)}" alt="avatar">`:icon('user','gold')}
function uname(){return state.telegram?.username?'@'+state.telegram.username:(state.telegram?.first_name||state.user?.first_name||'marooow')}
function top(){return `<div class="top"><div class="brand"><div class="brand-logo">${icon('star')}</div><div class="brand-title"><b>&marooow</b><span>кейсы · игры · подарки</span></div></div><div class="pills"><button class="pill gold" onclick="copyRef()">${icon('link')} Реф.</button><button class="pill" onclick="openTopup()">${icon('star','gold')} ${fmt(state.user?.stars||0)} +</button></div></div>${!state.authOk?`<div class="preview show">Preview-режим: Telegram не передал защищённую авторизацию. Интерфейс работает, но пополнение и начисления доступны только через свежую WebApp-кнопку /miniapp.</div>`:''}`}
function shell(){navRender();if(state.tab==='bonus')bonus();if(state.tab==='pass')pass();if(state.tab==='games')games();if(state.tab==='cases')cases();if(state.tab==='profile')profile()}
function bonus(){screen.innerHTML=`<div class="screen-inner">${top()}<section class="hero"><h1>Ежедневные<br>бонусы</h1><p>Забирай награды, прокачивай шанс и участвуй в дропах.</p><div class="hero-actions"><button class="btn" onclick="claimDaily()">Забрать</button><button class="btn ghost" onclick="setTab('profile')">Профиль</button></div><div class="hero-art">${svg.case}</div></section><div class="statgrid"><div class="stat"><span>Твой шанс</span><b>${state.chance?.final||3}%</b></div><div class="stat"><span>Активность 7д</span><b>${fmt(state.chance?.attempts_7d||0)}</b></div></div><section class="section"><div class="section-head"><h2>Быстрые действия</h2><span>premium</span></div><div class="grid"><button class="card" onclick="openTopup()"><div class="mini-icon">${icon('star')}</div><h3>Пополнить</h3><p>Stars или TON</p></button><button class="card" onclick="copyRef()"><div class="mini-icon">${icon('link')}</div><h3>Рефералка</h3><p>повышай шанс</p></button></div></section></div>`}
function pass(){const exp=state.user?.exp||0,next=state.user?.next_level_exp||10000,p=Math.min(100,Math.round(exp/next*100));screen.innerHTML=`<div class="screen-inner">${top()}<section class="hero"><h1>Battle Pass</h1><p>Уровни, задания и прогресс за активность.</p><div class="hero-actions"><button class="btn" onclick="setTab('games')">Фарм EXP</button></div><div class="hero-art">${svg.pass}</div></section><section class="section"><div class="profile"><div class="avatar">${avatar()}</div><div><div class="profile-name">Level ${state.user?.level||1}</div><div class="profile-id">${fmt(exp)} / ${fmt(next)} EXP</div></div></div><div class="progress"><div style="width:${p}%"></div></div></section><section class="section"><div class="rows"><div class="row"><div class="mini-icon">${icon('bolt')}</div><div class="row-main"><b>Комментируй посты</b><span>активность влияет на шанс</span></div></div><div class="row"><div class="mini-icon">${icon('link')}</div><div class="row-main"><b>Зови друзей</b><span>+0.1% за активного реферала</span></div></div></div></section></div>`}
function games(){screen.innerHTML=`<div class="screen-inner">${top()}<section class="section"><div class="section-head"><h2>Мини-игры</h2><span>fan demo</span></div><div class="grid"><button class="card" onclick="play('plinko')"><div class="mini-icon">${icon('game')}</div><h3>PLINKO</h3><p>ивентовая мини-игра</p></button><button class="card" onclick="play('crash')"><div class="mini-icon">${icon('bolt')}</div><h3>CRASH</h3><p>без ставок и вывода</p></button><button class="card wide"><h3>Безопасный режим</h3><p>Игры фановые: без казино, ставок и реального вывода. Награды только внутри проекта.</p></button></div></section></div>`}
function cases(){screen.innerHTML=`<div class="screen-inner">${top()}<section class="hero"><h1>Кейсы</h1><p>Витрины для ивентов, промо-дропов и будущих наград.</p><div class="hero-actions"><button class="btn" onclick="play('bear-case')">Открыть демо</button></div><div class="hero-art">${svg.case}</div></section><section class="section"><div class="grid"><button class="card" onclick="play('bear-case')"><div class="mini-icon">${icon('gift')}</div><h3>Bear Case</h3><p>скоро</p></button><button class="card" onclick="loadGifts(true)"><div class="mini-icon">${icon('diamond')}</div><h3>NFT Gifts</h3><p>каталог</p></button></div></section><section class="section" id="giftsPreview"></section></div>`;loadGifts(false)}
function profile(){screen.innerHTML=`<div class="screen-inner">${top()}<section class="section"><div class="profile"><div class="avatar">${avatar()}</div><div><div class="profile-name">${safe(uname())}</div><div class="profile-id">ID ${state.user?.telegram_id||state.telegram?.id||'—'} · ${fmt(state.user?.stars||0)} stars</div></div></div><div class="copybox"><input readonly value="${safe(state.user?.ref_link||'нет ссылки')}"><button onclick="copyRef()">${icon('copy')}</button></div></section><section class="section"><div class="statgrid"><div class="stat"><span>Активных рефов</span><b>${fmt(state.chance?.active_refs||0)}</b></div><div class="stat"><span>Побед</span><b>${fmt(state.user?.wins_count||0)}</b></div></div></section><section class="section"><div class="section-head"><h2>Инвентарь</h2><span>подарки</span></div><div class="rows" id="inventory"><div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>Загрузка</b><span>проверяем подарки</span></div></div></div></section></div>`;loadInventory()}
function navRender(){const items=[['bonus','gift','Бонусы'],['pass','pass','Пропуск'],['games','game','Игры'],['cases','diamond','Кейсы'],['profile','user','Профиль']];nav.innerHTML=items.map(([id,ic,t])=>`<button class="${state.tab===id?'active':''}" onclick="setTab('${id}')">${icon(ic)}<span>${t}</span></button>`).join('')}
function setTab(t){state.tab=t;shell();try{tg?.HapticFeedback?.selectionChanged?.()}catch(e){}}
async function bootstrap(){document.getElementById('loaderCase').innerHTML=svg.case;const steps=['загрузка интерфейса','подключение Telegram','получение профиля','подготовка витрин'];let si=0;const st=setInterval(()=>{$('#loadStep').textContent=steps[++si%steps.length]},650);let data=null;try{data=await api('/api/me',{},'POST',4500);state={...state,...data,authOk:true}}catch(e){state={...state,...fallbackState(),authOk:false}}clearInterval(st);shell();setTimeout(()=>$('#splash').classList.add('hide'),520);loadSideData()}
async function loadSideData(){try{state.winners=(await fetch('/api/winners',{cache:'no-store'}).then(r=>r.json())).items||[]}catch(e){}try{state.leaderboard=await fetch('/api/leaderboard',{cache:'no-store'}).then(r=>r.json())}catch(e){}}
async function claimDaily(){if(!state.authOk)return toast('bad','Нет авторизации','Открой через свежую кнопку /miniapp.');try{toast('wait','Проверяем','Начисляем ежедневный бонус...');const r=await api('/api/daily');closeStatus();toast('ok','Бонус получен',`+${r.stars_added} stars и +${r.exp_added} EXP`);await bootstrap()}catch(e){toast('bad','Не получилось',e.message||'Бонус пока недоступен')}}
async function play(game){if(!state.authOk)return toast('bad','Нет авторизации','Открой через кнопку бота.');try{toast('wait','Запуск','Крутим анимацию...');const r=await api('/api/play/demo',{game});closeStatus();toast('ok','Готово',`+${r.exp_added} EXP · очки ${r.demo_points}`);await bootstrap()}catch(e){toast('bad','Ошибка',e.message||'Попробуй позже')}}
function openTopup(){state.selectedAmount=null;state.topupMode='stars';renderTopup();sheet.classList.add('show')}function closeSheet(){sheet.classList.remove('show')}function setTopupMode(m){state.topupMode=m;state.selectedAmount=null;renderTopup()}function selectAmount(a){state.selectedAmount=a;renderTopup()}
function renderTopup(){const amounts=[30,100,200,500,1000,2500,5000];sheet.innerHTML=`<div class="sheet-card"><div class="sheet-top"><h2>Пополнение баланса</h2><button class="close" onclick="closeSheet()">${icon('close')}</button></div><div class="tabs">${['stars','ton','send','gifts'].map(m=>`<button class="tab ${state.topupMode===m?'active':''}" onclick="setTopupMode('${m}')">${icon(m==='stars'?'star':m==='ton'?'ton':m==='send'?'send':'gift')} ${m==='stars'?'Stars':m==='ton'?'TON':m==='send'?'Send':'Gifts'}</button>`).join('')}</div><input class="promo" placeholder="Промокод"><div id="topupBody"></div><button class="btn confirm" onclick="confirmTopup()" ${state.selectedAmount?'':'disabled'}>Подтвердить</button></div>`;renderTopupBody()}
function renderTopupBody(){const b=$('#topupBody');if(state.topupMode==='gifts'){b.innerHTML='<div class="note">Отправь подарок проекту — после проверки админ начислит баланс вручную. Авто-импорт личного инвентаря Telegram обычным ботам недоступен.</div>';return}if(state.topupMode==='send'){b.innerHTML='<div class="note">Send-оплата визуально готова. Сейчас используй Stars или TON.</div>'+amountList([30,100,200,500],true);return}if(state.topupMode==='ton'){b.innerHTML=`<div class="note">TON перевод идёт на кошелёк проекта. После оплаты нажми «Проверить».</div>${amountList([30,100,200,500,1000,2500],true)}`;return}b.innerHTML=amountList([30,100,200,500,1000,2500,5000],false)}
function amountList(arr,ton=false){return `<div class="amounts">${arr.map(a=>`<button class="amount ${state.selectedAmount===a?'active':''}" onclick="selectAmount(${a})"><span class="star-flat">${svg.star}</span><span class="row-main"><b>${fmt(a)} звёзд</b><span>${ton?'≈ '+money(a/(state.ton?.stars_per_ton||170))+' TON':'Telegram Stars'}</span></span><i class="radio"></i></button>`).join('')}</div>`}
async function confirmTopup(){if(!state.authOk)return toast('bad','Нет авторизации','Открой через кнопку бота.');if(!state.selectedAmount)return;if(state.topupMode==='stars')return payStars();if(state.topupMode==='ton')return payTon();toast('bad','Скоро','Этот способ пока в разработке')}
async function payStars(){try{toast('wait','Создаём счёт','Сейчас откроется Telegram invoice.');const r=await api('/api/topup',{amount:state.selectedAmount});closeStatus();if(tg?.openInvoice){tg.openInvoice(r.invoice_url,st=>{if(st==='paid')toast('ok','Оплата прошла','Баланс скоро обновится.');else toast('bad','Оплата не прошла','Счёт закрыт или отменён.')})}else location.href=r.invoice_url}catch(e){toast('bad','Ошибка оплаты',e.message||e.error||'Не удалось создать счёт')}}
async function payTon(){try{toast('wait','Готовим TON оплату','Создаём уникальный платёж.');const r=await api('/api/ton/create',{stars_amount:state.selectedAmount});closeStatus();const link=`ton://transfer/${encodeURIComponent(r.address)}?amount=${encodeURIComponent(r.amount_nano)}&text=${encodeURIComponent(r.comment)}`;sheet.innerHTML=`<div class="sheet-card"><div class="sheet-top"><h2>TON оплата</h2><button class="close" onclick="closeSheet()">${icon('close')}</button></div><div class="note">Переведи <b>${money(r.amount_ton)} TON</b> на кошелёк ниже. Комментарий обязателен.</div><div class="rows" style="margin-top:12px"><div class="row"><div class="row-main"><b>Адрес</b><span>${safe(r.address)}</span></div><button class="btn dark" onclick="copyText('${safe(r.address)}')">Copy</button></div><div class="row"><div class="row-main"><b>Комментарий</b><span>${safe(r.comment)}</span></div><button class="btn dark" onclick="copyText('${safe(r.comment)}')">Copy</button></div></div><a class="btn confirm" style="display:grid;place-items:center;text-decoration:none" href="${link}">Открыть кошелёк</a><button class="btn ghost confirm" onclick="checkTon(${r.deposit_id})">Проверить оплату</button></div>`}catch(e){toast('bad','TON ошибка',e.message||e.error||'Не удалось создать платёж')}}
async function checkTon(id){try{toast('wait','Проверяем','Ищем транзакцию в сети TON.');const r=await api('/api/ton/confirm',{deposit_id:id});closeStatus();if(r.status==='paid')toast('ok','Оплата прошла',`Начислено ${fmt(r.stars_added)} stars.`);else toast('wait','Ожидаем подтверждения',r.message||'Транзакция ещё индексируется.')}catch(e){toast('bad','Не найдено',e.message||'Платёж пока не подтверждён')}}
function copyText(t){try{navigator.clipboard?.writeText(t);tg?.HapticFeedback?.notificationOccurred?.('success')}catch(e){}toast('ok','Скопировано','Данные сохранены')}function copyRef(){const l=state.user?.ref_link;if(!l)return toast('bad','Нет ссылки','Авторизуйся через Telegram.');copyText(l)}
async function loadInventory(){const el=$('#inventory');if(!el)return;if(!state.authOk){el.innerHTML=`<div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>Preview</b><span>инвентарь появится после авторизации</span></div></div>`;return}try{const r=await api('/api/inventory');const items=r.items||[];el.innerHTML=items.length?items.map(x=>`<div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>${safe(x.prize_name)}</b><span>${safe(x.status)} · ${safe(String(x.created_at).slice(0,10))}</span></div></div>`).join(''):`<div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>Пусто</b><span>выигранные подарки появятся здесь</span></div></div>`}catch(e){el.innerHTML=`<div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>Не загрузилось</b><span>попробуй позже</span></div></div>`}}
async function loadGifts(scroll=false){const el=$('#giftsPreview');if(!el)return;try{const r=await fetch('/api/gift-catalog',{cache:'no-store'}).then(r=>r.json());const items=(r.items||[]).slice(0,7);el.innerHTML=`<div class="section-head"><h2>Telegram Gifts</h2><span>каталог</span></div><div class="rows">${items.length?items.map(g=>`<div class="row"><div class="mini-icon">${g.media_url?`<img src="${g.media_url}" style="width:38px;height:38px;object-fit:contain">`:icon('gift')}</div><div class="row-main"><b>${safe(g.id).slice(0,18)}...</b><span>${fmt(g.star_count)} stars · ${g.remaining_count??'∞'} осталось</span></div></div>`).join(''):`<div class="row"><div class="mini-icon">${icon('gift')}</div><div class="row-main"><b>Каталог пуст</b><span>Telegram Gifts недоступны</span></div></div>`}</div>`;if(scroll)el.scrollIntoView({behavior:'smooth'})}catch(e){el.innerHTML=`<div class="note">Каталог подарков временно недоступен.</div>`}}
window.setTab=setTab;window.openTopup=openTopup;window.closeSheet=closeSheet;window.setTopupMode=setTopupMode;window.selectAmount=selectAmount;window.confirmTopup=confirmTopup;window.closeStatus=closeStatus;window.copyRef=copyRef;window.claimDaily=claimDaily;window.play=play;window.copyText=copyText;window.checkTon=checkTon;window.loadGifts=loadGifts;
bootstrap();
</script>
</body>
</html>
