<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05060a" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>&marooow Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    :root{--bg:#05060a;--panel:#11131b;--panel2:#171923;--muted:#8a90a3;--text:#f7f8ff;--soft:#c9cedd;--gold:#ffc869;--gold2:#ffe6a7;--orange:#ff9e3d;--blue:#38a8ff;--violet:#9a67ff;--red:#ff4d6d;--green:#34df8c;--line:rgba(255,255,255,.09);--shadow:0 24px 80px rgba(0,0,0,.55);--radius:26px;--safe-bottom:env(safe-area-inset-bottom)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}button,input{font:inherit}button{cursor:pointer}body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 22% 5%,rgba(255,190,85,.24),transparent 28%),radial-gradient(circle at 100% 18%,rgba(110,71,255,.17),transparent 30%),radial-gradient(circle at 50% 92%,rgba(56,168,255,.11),transparent 24%),linear-gradient(180deg,#090a11 0%,#030407 100%);z-index:-3}body:after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:46px 46px;opacity:.16;z-index:-2}.glow{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}.glow i{position:absolute;border-radius:50%;filter:blur(28px);opacity:.48;animation:float 7s ease-in-out infinite}.glow i:nth-child(1){width:170px;height:170px;background:#ffbf5e;left:-70px;top:80px}.glow i:nth-child(2){width:160px;height:160px;background:#6737ff;right:-80px;top:200px;animation-delay:-2s}.glow i:nth-child(3){width:120px;height:120px;background:#2bb8ff;left:45%;bottom:-70px;animation-delay:-4s}@keyframes float{50%{transform:translateY(22px) scale(1.08)}}
    .build{position:fixed;right:10px;top:10px;z-index:100;font-size:10px;color:rgba(255,255,255,.25)}.splash{position:fixed;inset:0;z-index:80;display:grid;place-items:center;background:radial-gradient(circle at 50% 38%,rgba(255,188,75,.22),transparent 36%),#05060a;transition:.55s}.splash.hide{opacity:0;pointer-events:none;transform:scale(1.02)}.splash-card{text-align:center;transform:translateY(-2vh)}.mark{width:138px;height:138px;margin:0 auto 20px;border-radius:42px;background:linear-gradient(135deg,#ffdf91,#ffab3d 45%,#5c330e);display:grid;place-items:center;box-shadow:0 0 70px rgba(255,190,85,.28),inset 0 0 28px rgba(255,255,255,.24);position:relative;animation:pop 1s ease infinite alternate}.mark:before{content:"";position:absolute;inset:-18px;border-radius:54px;background:conic-gradient(from 180deg,transparent,#ffc869,transparent,#8b5cff,transparent);opacity:.45;filter:blur(3px);animation:spin 4s linear infinite}.mark span{position:relative;font-size:72px;font-weight:1000;color:#201206;text-shadow:0 2px 0 rgba(255,255,255,.35)}.splash-title{font-size:42px;line-height:1;font-weight:1000;letter-spacing:-2px;background:linear-gradient(180deg,#fff6d8,#ffbd55);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 34px rgba(255,200,90,.25)}.splash-sub{margin-top:8px;color:#cfd3df;font-weight:800;letter-spacing:.18em;text-transform:uppercase;font-size:11px}.loadbar{width:220px;height:10px;margin:24px auto 0;border-radius:99px;background:#171923;overflow:hidden;border:1px solid var(--line)}.loadbar em{display:block;height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#ffb347,#ffe6a7,#8b5cff);animation:load 1.7s ease forwards}.loadtext{margin-top:12px;color:#959bad;font-weight:700}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pop{to{transform:translateY(-7px) scale(1.025)}}@keyframes load{to{width:100%}}
    .app{height:100vh;height:100dvh;display:flex;flex-direction:column;opacity:0;transform:translateY(12px);transition:.45s}.app.ready{opacity:1;transform:none}.topbar{padding:18px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:11px;min-width:0}.logo{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,#2a1d0b,#ffbd55);box-shadow:0 0 26px rgba(255,190,85,.27);display:grid;place-items:center;font-weight:1000;font-size:26px;color:#fff}.brand b{display:block;font-size:24px;line-height:1;font-weight:1000;letter-spacing:-1px}.brand small{display:block;color:#99a0b2;margin-top:4px;font-weight:700;font-size:12px}.actions{display:flex;gap:8px}.pill{height:38px;border:1px solid var(--line);border-radius:999px;padding:0 12px;background:linear-gradient(180deg,#1a1c27,#11131a);color:#fff;display:flex;align-items:center;gap:7px;box-shadow:inset 0 1px rgba(255,255,255,.05);font-weight:900}.pill:active,.btn:active,.nav button:active,.card:active{transform:scale(.97)}.pill.gold{background:linear-gradient(180deg,#2a2113,#17120b);border-color:rgba(255,200,105,.26);color:var(--gold)}.viewport{flex:1;overflow:auto;padding:2px 14px 96px;scrollbar-width:none}.viewport::-webkit-scrollbar{display:none}.screen{display:none;animation:fadeUp .35s ease both}.screen.active{display:block}@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .hero{position:relative;min-height:192px;border-radius:32px;padding:22px;overflow:hidden;background:radial-gradient(circle at 82% 24%,rgba(255,198,92,.34),transparent 38%),linear-gradient(135deg,#151a26,#0f1118 62%,#2b1d0f);border:1px solid rgba(255,255,255,.1);box-shadow:var(--shadow);margin-bottom:14px}.hero:before{content:"";position:absolute;inset:-60px;background:conic-gradient(from 200deg,transparent,rgba(255,202,97,.18),transparent,rgba(139,92,255,.15),transparent);animation:spin 12s linear infinite}.hero h1,.hero p,.hero .hero-actions{position:relative}.hero h1{margin:0 0 10px;font-size:34px;line-height:.96;letter-spacing:-1.8px}.hero p{margin:0;color:#d9deee;line-height:1.35;font-weight:700;max-width:58%}.chest{position:absolute;right:18px;bottom:14px;width:118px;height:118px;border-radius:34px;background:radial-gradient(circle at 38% 24%,#fff4bd,#ffbe3c 34%,#46270b 78%);display:grid;place-items:center;font-size:60px;filter:drop-shadow(0 0 34px rgba(255,190,70,.35));animation:bob 2.2s ease-in-out infinite}.chest:after{content:"✦";position:absolute;right:10px;top:8px;color:white;font-size:24px}.hero-actions{display:flex;gap:8px;margin-top:18px}.btn{height:46px;border:0;border-radius:16px;padding:0 16px;background:#1a1d27;color:#fff;font-weight:1000;transition:.15s}.btn.primary{background:linear-gradient(180deg,#ffe49c,#ffb548);color:#1b1004;box-shadow:0 12px 28px rgba(255,183,72,.22)}.btn.ghost{border:1px solid var(--line);background:rgba(255,255,255,.06)}.btn.full{width:100%}@keyframes bob{50%{transform:translateY(-8px) rotate(1.5deg)}}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));box-shadow:0 16px 42px rgba(0,0,0,.22);padding:16px;position:relative;overflow:hidden;transition:.18s}.card:before{content:"";position:absolute;inset:-80px;background:radial-gradient(circle at 90% 0,rgba(255,202,97,.16),transparent 34%);pointer-events:none}.card h3{position:relative;margin:0 0 8px;font-size:18px;line-height:1.05}.card p{position:relative;margin:0;color:#aeb4c5;font-size:13px;line-height:1.35}.card.big{min-height:150px}.icon3d{position:absolute;right:12px;bottom:12px;font-size:54px;filter:drop-shadow(0 0 20px rgba(255,202,97,.2))}.stat{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;border-radius:18px;background:rgba(0,0,0,.22);border:1px solid var(--line);padding:12px}.stat b{font-size:18px}.stat small{color:var(--muted);font-weight:700}.section-title{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px}.section-title h2{margin:0;font-size:21px;letter-spacing:-.4px}.badge{border-radius:999px;background:rgba(255,200,105,.12);color:var(--gold);border:1px solid rgba(255,200,105,.2);padding:6px 10px;font-size:12px;font-weight:1000}.case{min-height:178px;display:flex;flex-direction:column;justify-content:space-between}.case .cover{height:86px;border-radius:20px;background:radial-gradient(circle at 35% 35%,#fff1ad,#ffba3c 28%,#20140d 74%);display:grid;place-items:center;font-size:54px;margin-bottom:12px}.case.blue .cover{background:radial-gradient(circle at 40% 35%,#baf0ff,#38a8ff 35%,#101a2a 75%)}.case.violet .cover{background:radial-gradient(circle at 40% 35%,#ead6ff,#9a67ff 35%,#170f2c 75%)}.case.locked{opacity:.78}.list{display:grid;gap:10px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;border-radius:18px;background:#12141c;border:1px solid var(--line)}.row-left{display:flex;align-items:center;gap:11px;min-width:0}.row-ico{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,#ffcb67,#6d3a12);display:grid;place-items:center;font-size:22px}.row b{display:block}.row small{display:block;color:var(--muted);margin-top:3px}.avatar{width:94px;height:94px;border-radius:32px;object-fit:cover;background:#181b25;border:1px solid var(--line);box-shadow:0 0 30px rgba(255,200,105,.14)}.profile-head{text-align:center;padding:18px}.profile-head h2{margin:10px 0 4px}.profile-head p{margin:0;color:#a9afc1}.progress{height:11px;background:#151821;border-radius:99px;overflow:hidden;border:1px solid var(--line)}.progress em{height:100%;display:block;width:0%;background:linear-gradient(90deg,#ffb445,#ffe6a7,#8b5cff);border-radius:99px}.empty{text-align:center;padding:38px 18px;color:#a8adbd}.empty .emo{font-size:48px;margin-bottom:10px}.nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + var(--safe-bottom));background:rgba(4,5,9,.82);backdrop-filter:blur(18px);border-top:1px solid var(--line);z-index:20}.nav button{border:0;background:transparent;color:#767d90;height:62px;border-radius:18px;font-size:11px;font-weight:800;display:grid;place-items:center;transition:.15s}.nav button span{font-size:24px;line-height:1}.nav button.active{color:var(--gold);text-shadow:0 0 22px rgba(255,200,105,.64);background:linear-gradient(180deg,rgba(255,200,105,.08),transparent)}
    .sheet,.modal{position:fixed;inset:0;z-index:50;pointer-events:none}.sheet.show,.modal.show{pointer-events:auto}.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.62);opacity:0;transition:.22s}.sheet.show .backdrop,.modal.show .backdrop{opacity:1}.panel{position:absolute;left:0;right:0;bottom:0;max-height:88vh;overflow:auto;background:#111217;border:1px solid var(--line);border-radius:30px 30px 0 0;box-shadow:0 -30px 90px rgba(0,0,0,.72);padding:14px 14px calc(18px + var(--safe-bottom));transform:translateY(105%);transition:.34s cubic-bezier(.2,.8,.2,1)}.sheet.show .panel{transform:none}.drag{width:44px;height:5px;border-radius:99px;background:#30333d;margin:0 auto 14px}.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sheet-head h2{margin:0;font-size:22px}.sheet-head p{margin:4px 0 0;color:#8d94a6}.x{width:42px;height:42px;border-radius:99px;background:#1c1e27;color:white;border:0;font-size:30px}.paytabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}.paytabs button{height:42px;border-radius:13px;border:1px solid var(--line);background:#171923;color:#8f96aa;font-weight:900}.paytabs button.active{color:white;border-color:white;background:#20232d}.input{width:100%;height:48px;border-radius:15px;background:#14161e;border:1px solid var(--line);color:white;padding:0 14px;margin-bottom:10px;outline:none}.toprow{display:flex;align-items:center;justify-content:space-between;padding:14px;border-radius:16px;background:#171922;border:1px solid var(--line);margin-bottom:8px}.toprow strong{display:flex;gap:8px;align-items:center}.toprow small{color:#9da3b3}.radio{width:22px;height:22px;border-radius:50%;border:1px solid #51596c}.toprow.active{border-color:rgba(255,200,105,.55);box-shadow:0 0 0 1px rgba(255,200,105,.18),0 0 24px rgba(255,200,105,.1)}.toprow.active .radio{border:6px solid var(--gold)}.confirm{position:sticky;bottom:0;margin-top:10px}.modal-card{position:absolute;left:20px;right:20px;top:50%;transform:translateY(-45%) scale(.94);opacity:0;transition:.24s;background:#151720;border:1px solid var(--line);border-radius:28px;padding:24px;text-align:center;box-shadow:var(--shadow)}.modal.show .modal-card{opacity:1;transform:translateY(-50%) scale(1)}.status{width:86px;height:86px;border-radius:30px;margin:0 auto 14px;display:grid;place-items:center;font-size:48px;font-weight:1000}.status.ok{background:radial-gradient(circle,#c7ffdf,#26d77e);color:#06140b;box-shadow:0 0 42px rgba(38,215,126,.3)}.status.err{background:radial-gradient(circle,#ffd1dc,#ff4d6d);color:#1f0208;box-shadow:0 0 42px rgba(255,77,109,.28)}.toast{position:fixed;left:14px;right:14px;bottom:92px;z-index:90;padding:14px 16px;border-radius:18px;background:rgba(23,25,34,.96);border:1px solid var(--line);box-shadow:var(--shadow);transform:translateY(130%);transition:.25s;font-weight:800}.toast.show{transform:none}@media(max-width:360px){.hero h1{font-size:30px}.hero p{max-width:64%}.chest{width:100px;height:100px;font-size:50px}.brand b{font-size:21px}.pill{padding:0 10px}}
  </style>
</head>
<body>
  <div class="build">UI v6-hardfix</div>
  <div class="glow"><i></i><i></i><i></i></div>
  <div class="splash" id="splash"><div class="splash-card"><div class="mark"><span>&</span></div><div class="splash-title">marooow</div><div class="splash-sub">cases · games · drops</div><div class="loadbar"><em></em></div><div class="loadtext" id="loadText">Загрузка Mini App…</div></div></div>
  <div class="app" id="app">
    <header class="topbar"><div class="brand"><div class="logo">&</div><div><b>&marooow</b><small>подарки · кейсы · активность</small></div></div><div class="actions"><button class="pill" id="refBtn">🔗 <b>Реф.</b></button><button class="pill gold" id="topupBtn">★ <b id="balance">0</b> <b>+</b></button></div></header>
    <main class="viewport" id="view"></main>
    <nav class="nav" id="nav"><button class="active" data-tab="free"><span>🎁</span><small>Бонусы</small></button><button data-tab="pass"><span>🪄</span><small>Пропуск</small></button><button data-tab="games"><span>🎯</span><small>Игры</small></button><button data-tab="cases"><span>💎</span><small>Кейсы</small></button><button data-tab="profile"><span>👤</span><small>Профиль</small></button></nav>
  </div>
  <section class="sheet" id="sheet"><div class="backdrop" data-close></div><div class="panel"><div class="drag"></div><div class="sheet-head"><div><h2>Пополнение баланса</h2><p>Выбери способ и сумму</p></div><button class="x" data-close>×</button></div><div class="paytabs" id="paytabs"><button class="active" data-pay="stars">★ Stars</button><button data-pay="ton">💎 TON</button><button data-pay="send">◆ Send</button><button data-pay="gifts">🎁 Gifts</button></div><input class="input" placeholder="Промокод"><div id="ton-connect" style="margin-bottom:10px"></div><div id="topups"></div><button class="btn primary full confirm" id="payBtn">Подтвердить</button></div></section>
  <section class="modal" id="modal"><div class="backdrop" data-modal-close></div><div class="modal-card"><div class="status ok" id="statusIcon">✓</div><h2 id="statusTitle">Готово</h2><p id="statusText">Операция выполнена.</p><button class="btn primary full" data-modal-close>Понятно</button></div></section>
  <div class="toast" id="toast"></div>
  <script>
    const tg=window.Telegram?.WebApp; tg?.ready?.(); tg?.expand?.();
    const initData=tg?.initData||''; let state={tab:'free',pay:'stars',selected:null,user:null,me:null,winners:[],leaders:[],gifts:[],inventory:[]};
    const $=s=>document.querySelector(s); const view=$('#view'); const balance=$('#balance');
    function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2300)}
    function modal(type,title,text){$('#statusIcon').className='status '+(type==='err'?'err':'ok');$('#statusIcon').textContent=type==='err'?'×':'✓';$('#statusTitle').textContent=title;$('#statusText').textContent=text;$('#modal').classList.add('show')}
    async function api(path,opts={}){const o={...opts,headers:{'Content-Type':'application/json',...(opts.headers||{})}}; if(o.method==='POST'&&!o.body)o.body=JSON.stringify({initData}); if(o.body&&typeof o.body!=='string')o.body=JSON.stringify({...o.body,initData}); const r=await fetch(path,o); return r.json()}
    function userName(){return state.me?.telegram?.username?'@'+state.me.telegram.username:(state.me?.telegram?.first_name||'marooow')}
    function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    function render(){balance.textContent=state.me?.user?.stars??0; document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab)); view.innerHTML=screens[state.tab](); requestAnimationFrame(()=>view.querySelector('.screen')?.classList.add('active'))}
    const screens={
      free:()=>`<section class="screen active"><div class="hero"><h1>Ежедневные бонусы</h1><p>Забирай награды, качай уровень и повышай шанс на дропы.</p><div class="hero-actions"><button class="btn primary" onclick="daily()">Забрать бонус</button><button class="btn ghost" onclick="copyRef()">Реф. ссылка</button></div><div class="chest">🎁</div></div><div class="grid2"><div class="card big"><h3>Твой шанс</h3><p>База + реферальный бонус</p><div class="stat"><span><small>Сейчас</small><b>${state.me?.chance?.final??3}%</b></span><span>🎲</span></div></div><div class="card big"><h3>Активность</h3><p>Попытки за 7 дней</p><div class="stat"><span><small>Комменты</small><b>${state.me?.activity?.attempts_7d??0}</b></span><span>🔥</span></div></div></div><div class="section-title"><h2>Победители</h2><span class="badge">live</span></div><div class="list">${(state.winners.length?state.winners:[{user:'Пока пусто',prize:'жди первый дроп',date:''}]).map(w=>`<div class="row"><div class="row-left"><div class="row-ico">🏆</div><div><b>${w.user}</b><small>${esc(w.prize)} · ${esc(w.date||'')}</small></div></div><b>★</b></div>`).join('')}</div></section>`,
      cases:()=>`<section class="screen active"><div class="hero"><h1>Кейсы</h1><p>Красивые витрины для будущих ивентов, промо-дропов и подарков.</p><div class="chest">💎</div></div><div class="grid2"><div class="card case"><div class="cover">🧸</div><h3>Bear Case</h3><p>скоро</p></div><div class="card case blue"><div class="cover">💎</div><h3>NFT Case</h3><p>скоро</p></div><div class="card case violet"><div class="cover">🎁</div><h3>Gift Drop</h3><p>ивенты</p></div><div class="card case locked"><div class="cover">👑</div><h3>Premium</h3><p>в разработке</p></div></div></section>`,
      games:()=>`<section class="screen active"><div class="section-title"><h2>Мини-игры</h2><span class="badge">fan/demo</span></div><div class="grid2"><div class="card big"><h3>PLINKO</h3><p>Демо-режим для ивентов</p><div class="icon3d">🟣</div><button class="btn ghost" onclick="play('plinko')">Играть</button></div><div class="card big"><h3>CRASH</h3><p>Без ставок и вывода</p><div class="icon3d">🚀</div><button class="btn ghost" onclick="play('crash')">Играть</button></div></div><div class="card" style="margin-top:12px"><h3>Важно</h3><p>Игры фановые/event-only: без казино, реальных ставок и денежных выигрышей.</p></div></section>`,
      pass:()=>`<section class="screen active"><div class="hero"><h1>Боевой пропуск</h1><p>Качай уровень через активность и получай будущие бонусы.</p><div class="chest">👑</div></div><div class="card"><h3>Уровень ${state.me?.user?.level??1}</h3><p>${state.me?.user?.exp??0} / ${state.me?.user?.next_level_exp??10000} EXP</p><div class="progress" style="margin-top:14px"><em style="width:${Math.min(100,((state.me?.user?.exp??0)/(state.me?.user?.next_level_exp??10000))*100)}%"></em></div></div><div class="section-title"><h2>Лидеры</h2></div><div class="list">${(state.leaders.length?state.leaders:[{user:'Пока пусто',count:0}]).map((r,i)=>`<div class="row"><div class="row-left"><div class="row-ico">${i+1}</div><div><b>${r.user}</b><small>${r.count} активных рефов</small></div></div><b>›</b></div>`).join('')}</div></section>`,
      profile:()=>`<section class="screen active"><div class="profile-head card"><img class="avatar" src="${state.me?.user?.photo_url||''}" onerror="this.style.display='none'"/><h2>${esc(userName())}</h2><p>ID ${state.me?.telegram?.id??'—'}</p></div><div class="grid2"><div class="card"><h3>Баланс</h3><p><b style="font-size:24px;color:var(--gold)">${state.me?.user?.stars??0} ★</b></p></div><div class="card"><h3>Шанс</h3><p><b style="font-size:24px;color:var(--gold)">${state.me?.chance?.final??3}%</b></p></div></div><div class="section-title"><h2>Инвентарь</h2><span class="badge">${state.inventory.length}</span></div>${state.inventory.length?`<div class="list">${state.inventory.map(i=>`<div class="row"><div class="row-left"><div class="row-ico">🎁</div><div><b>${esc(i.prize_name)}</b><small>${esc(i.status)}</small></div></div><b>›</b></div>`).join('')}</div>`:`<div class="empty"><div class="emo">🎒</div><b>Ничего не найдено</b><p>Подарки появятся после побед.</p></div>`}</section>`
    };
    async function boot(){setTimeout(()=>{$('#splash').classList.add('hide');$('#app').classList.add('ready')},950); if(!initData){$('#loadText').textContent='Открыто без Telegram-авторизации'; state.me={telegram:{id:'preview',first_name:'preview'},user:{stars:0,level:1,exp:253,next_level_exp:10000,ref_link:'https://t.me/marooowbot'},chance:{base:3,bonus:0,final:3},activity:{attempts_7d:0}}; render(); return} try{state.me=await api('/api/me',{method:'POST'}); const [w,l,inv]=await Promise.all([fetch('/api/winners').then(r=>r.json()).catch(()=>({items:[]})),fetch('/api/leaderboard').then(r=>r.json()).catch(()=>({items:[]})),api('/api/inventory',{method:'POST'}).catch(()=>({items:[]}))]); state.winners=w.items||[]; state.leaders=l.items||[]; state.inventory=inv.items||[]; render()}catch(e){modal('err','Ошибка загрузки','Не удалось получить профиль. Открой Mini App через кнопку в боте.'); render()}}
    async function daily(){try{const r=await api('/api/daily',{method:'POST'}); if(r.ok){modal('ok','Бонус получен',`+${r.amount||0} ★ на баланс`); state.me.user.stars=r.balance??state.me.user.stars; render()}else modal('err','Пока нельзя',r.message||'Бонус уже забран')}catch(e){modal('err','Ошибка','Не удалось забрать бонус')}}
    async function play(game){try{const r=await api('/api/play/demo',{method:'POST',body:{game}}); if(r.ok)modal('ok','Демо-игра',`+${r.exp_added} EXP. Очки: ${r.demo_points}`); else modal('err','Ошибка',r.message||'Не получилось')}catch(e){modal('err','Ошибка','Игра временно недоступна')}}
    function copyRef(){const l=state.me?.user?.ref_link||'https://t.me/marooowbot'; navigator.clipboard?.writeText(l); tg?.HapticFeedback?.notificationOccurred?.('success'); toast('Реферальная ссылка скопирована')}
    $('#refBtn').onclick=copyRef; $('#topupBtn').onclick=()=>openSheet(); document.querySelectorAll('[data-close]').forEach(x=>x.onclick=()=>$('#sheet').classList.remove('show')); document.querySelectorAll('[data-modal-close]').forEach(x=>x.onclick=()=>$('#modal').classList.remove('show')); $('#nav').onclick=e=>{const b=e.target.closest('button[data-tab]'); if(!b)return; state.tab=b.dataset.tab; tg?.HapticFeedback?.selectionChanged?.(); render()};
    const amounts=[30,100,200,500,1000,2500,5000]; function openSheet(){state.selected=null; $('#sheet').classList.add('show'); renderTopups()} $('#paytabs').onclick=e=>{const b=e.target.closest('button[data-pay]'); if(!b)return; state.pay=b.dataset.pay; document.querySelectorAll('#paytabs button').forEach(x=>x.classList.toggle('active',x===b)); renderTopups()};
    function renderTopups(){const box=$('#topups'); if(state.pay==='gifts'){box.innerHTML='<div class="empty"><div class="emo">🎁</div><b>Мои подарки</b><p>Отправь подарок боту — админ проверит и начислит баланс.</p></div>';return} if(state.pay==='send'){box.innerHTML='<div class="empty"><div class="emo">◆</div><b>Send</b><p>Скоро. Сейчас используй Stars или TON.</p></div>';return} box.innerHTML=amounts.map(a=>`<div class="toprow ${state.selected===a?'active':''}" data-amount="${a}"><strong>★ ${a} Звезд</strong><small>${state.pay==='ton'?'~ '+(a/170).toFixed(2)+' TON':''}</small><span class="radio"></span></div>`).join(''); box.querySelectorAll('.toprow').forEach(r=>r.onclick=()=>{state.selected=Number(r.dataset.amount);renderTopups()})}
    $('#payBtn').onclick=async()=>{if(!state.selected){toast('Выбери сумму');return} if(state.pay==='stars'){try{const r=await api('/api/topup',{method:'POST',body:{amount:state.selected}}); if(r.ok&&r.invoice_link){tg?.openInvoice?.(r.invoice_link,st=>{if(st==='paid')modal('ok','Оплата прошла','Баланс обновится автоматически.'); else modal('err','Оплата не прошла','Платёж отменён или не завершён.')})}else modal('err','Ошибка оплаты',r.message||'Не удалось создать счёт')}catch(e){modal('err','Ошибка','Не удалось создать счёт')}} else if(state.pay==='ton'){modal('ok','TON-платёж','Подключение TON Connect включается после настройки TONAPI_KEY и manifest.')}};
    boot();
  </script>
</body>
</html>
